apiVersion: apps/v1
kind: Deployment
metadata:
  name: vpa-worker
  namespace: demo
  labels:
    app: vpa-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vpa-worker
  template:
    metadata:
      labels:
        app: vpa-worker
    spec:
      containers:
      - name: worker
        image: busybox
        command: ["sh", "-c", "while true; do dd if=/dev/zero of=/dev/null; done"]
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: vpa-worker-scaler
  namespace: demo
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vpa-worker
  updatePolicy:
    updateMode: "Off" # Recommendation-only mode for testing
