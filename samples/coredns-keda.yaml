apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: coredns-keda
  namespace: kube-system
spec:
  scaleTargetRef:
    name: coredns
  minReplicaCount: 2
  maxReplicaCount: 10
  cooldownPeriod: 60
  pollingInterval: 30
  triggers:
  - type: prometheus
    metadata:
      serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
      metricName: coredns_dns_requests_total
      threshold: "100"
      query: |
        sum(rate(coredns_dns_requests_total[1m]))