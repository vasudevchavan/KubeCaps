apiVersion: apps/v1
kind: Deployment
metadata:
  name: hpa-worker
  namespace: demo
  labels:
    app: hpa-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hpa-worker
  template:
    metadata:
      labels:
        app: hpa-worker
    spec:
      containers:
      - name: worker
        image: busybox
        command: ["sh", "-c", "while true; do dd if=/dev/zero of=/dev/null; done"]
        resources:
          requests:
            cpu: "200m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hpa-worker-scaler
  namespace: demo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hpa-worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
